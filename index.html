<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metsaregistri kaart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
        <h1>Metsaregistri kaart</h1>
        <button id="sidebar-toggle" title="Peida/näita külgriba">☰</button>
      </div>

      <div id="sidebar-body">
        <div id="coord-box" class="status-bar">
          <span class="coord-icon">🔍</span>
          <input id="coord-input" type="text" inputmode="decimal" autocomplete="off"
                 placeholder="laius, pikkus" title="Sisesta koordinaadid (nt 58.706, 24.257) ja vajuta Enter. Tühjana näitab kaardi keskpunkti.">
        </div>

        <button id="nav-here-btn" class="btn-wide" disabled>&#9655; Navigeeri siia</button>

        <details class="panel" open>
          <summary>Kaardikihid</summary>
          <div id="layers-list"></div>
        </details>

        <details class="panel" open>
          <summary>Asukoha info</summary>
          <div id="feature-info" class="feature-info-box">
            <p class="empty">Klõpsa kaardil info saamiseks.</p>
          </div>
        </details>
      </div>
    </div>

    <div id="map-container">
      <button id="sidebar-float-btn" title="Ava külgriba">☰</button>
      <div id="map"></div>
      <div id="map-controls">
        <button id="locate-btn" title="Mine minu asukohta">📍</button>
        <button id="mode-toggle" title="Liikumisviis: auto">🚗</button>
        <button id="clear-route-btn" title="Kustuta marsruut" class="hidden">✕ Marsruut</button>
      </div>
    </div>
  </div>

  <div id="visit-dialog" class="dialog-overlay hidden">
    <div class="dialog-content" id="dialog-inner"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/proj4@2.11.0/dist/proj4.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ol@9.2.4/dist/ol.js"></script>
  <script src="app.js"></script>
</body>
</html>
